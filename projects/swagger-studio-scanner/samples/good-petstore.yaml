openapi: 3.0.3
info:
  title: Scanner Good Petstore
  version: 1.0.0
  description: >
    Well-formed sample API used to demonstrate the scanner's pass state.
    Has operationIds, tags, summaries, descriptions, examples, error
    responses, contact and license metadata.
  contact:
    name: API Foundation Platform Team
    email: platform@example.com
    url: https://example.com/api-platform
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
servers:
  - url: https://api.example.com/v1
    description: Production
tags:
  - name: pets
    description: Operations on individual pets and the pet collection
paths:
  /pets:
    get:
      operationId: listPets
      summary: List all pets
      description: Returns a paginated list of pets in the store.
      tags: [pets]
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          description: Maximum number of pets to return per page.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
            example: 20
      responses:
        '200':
          description: A paginated list of pets.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
              example:
                - id: 1
                  name: Rex
                  tag: dog
        '400':
          description: Bad request — invalid query parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: createPet
      summary: Create a new pet
      description: Adds a new pet to the store.
      tags: [pets]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        description: The pet to create.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewPet'
      responses:
        '201':
          description: Pet created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '400':
          description: Bad request — validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /pets/{petId}:
    get:
      operationId: getPetById
      summary: Get a pet by ID
      description: Returns a single pet identified by its numeric ID.
      tags: [pets]
      security:
        - bearerAuth: []
      parameters:
        - name: petId
          in: path
          required: true
          description: The unique identifier of the pet.
          schema:
            type: integer
            format: int64
            example: 1
      responses:
        '200':
          description: The requested pet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '404':
          description: Pet not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: OAuth2/JWT bearer token. Satisfies OWASP API2:2023 Broken Authentication.
  schemas:
    Pet:
      type: object
      description: A pet in the store.
      required: [id, name]
      properties:
        id:
          type: integer
          format: int64
          description: The unique identifier of the pet.
          example: 1
        name:
          type: string
          description: The pet's display name.
          example: Rex
        tag:
          type: string
          description: Optional categorisation tag.
          example: dog
    NewPet:
      type: object
      description: Payload for creating a new pet.
      required: [name]
      properties:
        name:
          type: string
          description: The pet's display name.
          example: Rex
        tag:
          type: string
          description: Optional categorisation tag.
          example: dog
    Error:
      type: object
      description: Standard error envelope.
      required: [code, message]
      properties:
        code:
          type: integer
          description: HTTP-aligned numeric error code.
          example: 400
        message:
          type: string
          description: Human-readable error message.
          example: Invalid query parameter
